# Redisson config — Variant 1: single Redis node
# redisson-spring-boot-starter auto-loads this file
singleServerConfig:
  address: "redis://127.0.0.1:6379"
  connectionMinimumIdleSize: 2
  connectionPoolSize: 10
  idleConnectionTimeout: 10000
  connectTimeout: 10000
  timeout: 3000
  retryAttempts: 3
  retryInterval: 1500

threads: 16
nettyThreads: 32
codec: !<org.redisson.codec.JsonJacksonCodec> {}
