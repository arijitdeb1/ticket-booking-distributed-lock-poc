version: "3.9"

services:

  # --- Variant 1: single Redis node ---
  redis:
    image: redis:7-alpine
    container_name: redis-single
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Variant 2 (future): three Redis nodes for Redlock ---
